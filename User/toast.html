<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toast Notification</title>

  <!-- Tailwind (đã có trong dự án) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font giống dự án -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .font-open-sans { font-family: 'Open Sans', sans-serif; }

    /* Toast Container */
    #toast-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    /* Toast Item */
    .toast {
      min-width: 320px;
      max-width: 90%;
      background: #000000ee;
      color: white;
      border: 2px solid #e11d48;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 10px 30px rgba(225, 29, 72, 0.4);
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      pointer-events: all;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .toast.success .icon {
      color: #e11d48;
    }

    .toast .icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .toast .message {
      flex: 1;
    }

    .toast .message .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .toast .message .detail {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .toast .close-btn {
      cursor: pointer;
      padding: 4px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .toast .close-btn:hover {
      opacity: 1;
    }

    /* Animation khi biến mất */
    .toast.hide {
      opacity: 0;
      transform: translateY(-30px) scale(0.95);
    }
  </style>
</head>
<body>

  <!-- Đặt div này vào cuối body của các trang (home.html, shop.html, …) -->
  <div id="toast-container"></div>

  <script>
    // Hàm hiển thị toast
    function showCartToast(productName = "Sản phẩm") {
      const container = document.getElementById('toast-container');

      const toast = document.createElement('div');
      toast.className = 'toast success show';

      toast.innerHTML = `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12l2 2 4-4"></path>
        </svg>
        <div class="message">
          <div class="title">Thêm vào giỏ hàng thành công!</div>
          <div class="detail">${productName} đã được thêm vào giỏ hàng của bạn.</div>
        </div>
        <div class="close-btn" onclick="this.parentElement.classList.replace('show','hide'); setTimeout(()=>this.parentElement.remove(), 400);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </div>
      `;

      container.appendChild(toast);

      // Tự động ẩn sau 4 giây
      setTimeout(() => {
        toast.classList.replace('show', 'hide');
        setTimeout(() => toast.remove(), 400);
      }, 4000);
    }

    // ==================== DEMO (xóa đoạn này khi dùng thật) ====================
    // Để test: tự động hiện toast sau 1 giây khi mở file này
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => showCartToast("Áo Đấu Đội T1"), 1000);
    });
    // ==========================================================================

    // Nếu bạn đã có nút "Thêm vào giỏ hàng" trong home.html với class .add-to-cart
    // thì chỉ cần thêm đoạn này vào file js/index.js hoặc cuối body:
    /*
    document.querySelectorAll('.add-to-cart').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const productName = this.getAttribute('data-product') || 'Sản phẩm';
        showCartToast(productName);

        // Ở đây bạn sẽ viết logic thật để thêm vào giỏ (localStorage, fetch API, …)
        // ví dụ: addToCart(productName);
      });
    });
    */
  </script>
</body>
</html>
